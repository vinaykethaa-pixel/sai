databases:
  - name: ramdb
    plan: free
    region: oregon

services:
  - type: web
    name: restricted-area-monitor
    env: docker
    plan: free
    region: oregon 
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ramdb
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
