<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline – Restricted Area Monitor</title>
    <link rel="manifest" href="/static/site.webmanifest">
    <meta name="theme-color" content="#6c63ff">
    <style>
        :root {
            --primary: #6c63ff;
            --dark-bg: #0d0d1a;
            --card-bg: rgba(255,255,255,0.04);
            --border: rgba(108,99,255,0.2);
            --text: #e0e0f0;
            --muted: #888aaa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--dark-bg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(ellipse at 30% 40%, rgba(108,99,255,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 70%, rgba(255,71,87,0.1) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .offline-card {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px 40px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            backdrop-filter: blur(20px);
            max-width: 420px;
            width: 90%;
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .offline-icon {
            font-size: 5rem;
            margin-bottom: 24px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        p {
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .signal-bars {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 5px;
            margin-bottom: 28px;
            height: 40px;
        }

        .signal-bar {
            width: 10px;
            border-radius: 3px;
            background: rgba(108,99,255,0.2);
            border: 1px solid rgba(108,99,255,0.3);
        }

        .signal-bar:nth-child(1) { height: 15px; }
        .signal-bar:nth-child(2) { height: 22px; }
        .signal-bar:nth-child(3) { height: 30px; }
        .signal-bar:nth-child(4) { height: 40px; }

        .btn-retry {
            background: linear-gradient(135deg, #6c63ff, #a78bfa);
            border: none;
            color: white;
            padding: 14px 36px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-retry:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(108,99,255,0.5);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4757;
            display: inline-block;
            margin-right: 6px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .status-text {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">📡</div>
        
        <div class="signal-bars">
            <div class="signal-bar"></div>
            <div class="signal-bar"></div>
            <div class="signal-bar"></div>
            <div class="signal-bar"></div>
        </div>

        <h1>You're Offline</h1>
        <p>Internet connection లేదు. Active monitoring కి internet connection అవసరం. కొంచెం check చేసి మళ్ళీ try చేయండి.</p>

        <a href="/" class="btn-retry">
            🔄 Try Again
        </a>

        <p class="status-text">
            <span class="status-dot"></span>
            Waiting for connection...
        </p>
    </div>

    <script>
        // Auto-reload when back online
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
